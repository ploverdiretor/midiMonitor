<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web MIDI Monitor</title>
    <link rel="stylesheet" type="text/css" media="all" href="index.css">
</head>
<body>
    <h1>Web MIDI Monitor</h1>
    <p>Status: <span id="midi-status" class="midi-status">Not connected</span></p>
    <hr>
    <div class="field">
        <div class="field01">
            <h3>Received MIDI Messages:</h3>
            <div id="midi-log" class="midi-log"></div>
            <br>
            <hr width="100%" align="left">
            <table>
                <tr>
                    <td><h3>OSC Assigner:</h3></td><td><button id="play">Play</button><button id="stop">Stop</button></td>
                </tr>
            </table>
            <table border="1"  id="assigner">
                <tr>
                    <td align="center" width="6.25%">0</td><td align="center" width="6.25%">1</td><td align="center" width="6.25%">2</td><td align="center" width="6.25%">3</td>
                    <td align="center" width="6.25%">4</td><td align="center" width="6.25%">5</td><td align="center" width="6.25%">6</td><td align="center" width="6.25%">7</td>
                    <td align="center" width="6.25%">8</td><td align="center" width="6.25%">9</td><td align="center" width="6.25%">10</td><td align="center" width="6.25%">11</td>
                    <td align="center" width="6.25%">12</td><td align="center" width="6.25%">13</td><td align="center" width="6.25%">14</td><td align="center" width="6.25%">15</td>
                </tr>
                <tr>
                    <td id="voice0" align="center"></td><td id="voice1" align="center"></td><td id="voice2" align="center"></td><td id="voice3" align="center"></td>
                    <td id="voice4" align="center"></td><td id="voice5" align="center"></td><td id="voice6" align="center"></td><td id="voice7" align="center"></td>
                    <td id="voice8" align="center"></td><td id="voice9" align="center"></td><td id="voice10" align="center"></td><td id="voice11" align="center"></td>
                    <td id="voice12" align="center"></td><td id="voice13" align="center"></td><td id="voice14" align="center"></td><td id="voice15" align="center"></td>
                </tr>
                <tr>
                    <td id="note0val" align="center"></td><td id="note1val" align="center"></td><td id="note2val" align="center"></td><td id="note3val" align="center"></td>
                    <td id="note4val" align="center"></td><td id="note5val" align="center"></td><td id="note6val" align="center"></td><td id="note7val" align="center"></td>
                    <td id="note8val" align="center"></td><td id="note9val" align="center"></td><td id="note10val" align="center"></td><td id="note11val" align="center"></td>
                    <td id="note12val" align="center"></td><td id="note13val" align="center"></td><td id="note14val" align="center"></td><td id="note15val" align="center"></td>
                </tr>
                <tr>
                    <td id="env0val" align="center"></td><td id="env1val" align="center"></td><td id="env2val" align="center"></td><td id="env3val" align="center"></td>
                    <td id="env4val" align="center"></td><td id="env5val" align="center"></td><td id="env6val" align="center"></td><td id="env7val" align="center"></td>
                    <td id="env8val" align="center"></td><td id="env9val" align="center"></td><td id="env10val" align="center"></td><td id="env11val" align="center"></td>
                    <td id="env12val" align="center"></td><td id="env13val" align="center"></td><td id="env14val" align="center"></td><td id="env15val" align="center"></td>
                </tr> 
            </table>
            <br>
            <hr width="100%" align="left">
        </div>
        <div class="field02">
            <table border="0"  width="10%">
                <tr><th>Master</th><td><input type="range" id="master" min="0" max="1" step="0.01" value="0.2"/></td><td id="masterval"></td></tr>
                <tr><th><br></th><td></td><td></td></tr>          
                <tr><th>Harmonics</th><th>imag</th></tr>
                <tr><th>1</th><td><input type="range" min="0" max="1" step="0.01" id="imag1" value="1"/></td><td id="imag1val"></td></tr>
                <tr><th>2</th><td><input type="range" min="0" max="1" step="0.01" id="imag2" value="0.5"/></td><td id="imag2val"></td></tr>
                <tr><th>3</th><td><input type="range" min="0" max="1" step="0.01" id="imag3" value="0"/></td><td id="imag3val"></td></tr>
                <tr><th>4</th><td><input type="range" min="0" max="1" step="0.01" id="imag4" value="0"/></td><td id="imag4val"></td></tr>
                <tr><th>5</th><td><input type="range" min="0" max="1" step="0.01" id="imag5" value="0"/></td><td id="imag5val"></td></tr>
                <tr><th>6</th><td><input type="range" min="0" max="1" step="0.01" id="imag6" value="0"/></td><td id="imag6val"></td></tr>
                <tr><th>7</th><td><input type="range" min="0" max="1" step="0.01" id="imag7" value="0"/></td><td id="imag7val"></td></tr>
            </table>
            <br>
            <table>
                <tr><th>Type</th><td>
                    <select id="type">
                        <option value="sine">Sine</option>
                        <option value="square">Square</option>
                        <option value="sawtooth" checked>SawTooth</option>
                        <option value="triangle">Triangle</option>
                    </select>
                </td></tr>
            </table>
            <table>
                <tr><th>Type</th><td><select id="typeFilter"><option>LPF</option><option>HPF</option><option>BPF</optioin>
                <option>LowShelf</option><option>HighShelf</option><option>Peaking</option><option>Notch</option><option>AllPass</option>
                </select></td></tr>
                <tr><th>Freq</th><td><input type="range" id="freqF" min="100" max="20000" value="5000"/></td><td id="freqvalFilter"></td></tr>
                <tr><th>Q</th><td><input type="range" id="qF" min="0" max="50" step="0.1" value="5"/></td><td id="qvalFilter"></td></tr>
                <tr><th>Gain</th><td><input type="range" id="gainF" min="-50" max="50" value="0"/></td><td id="gainvalFilter"></td></tr>
            </table>
        </div>
    </div>
    <script src="main.js"></script>
    <script src="osc.js"></script>
</body>
</html>
